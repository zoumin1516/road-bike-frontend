name: Deploy Frontend
on:
  push:
    branches:
      - main
env:
  IMAGE_NAME: road-bike-frontend
  DEPLOY_PATH: /opt/bike_web
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4

      - name: Set build tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build frontend image
        run: |
          set -e
          echo "Building $IMAGE_NAME:${{ steps.vars.outputs.tag }}"
          docker build -t "$IMAGE_NAME:${{ steps.vars.outputs.tag }}" .
          docker image ls "$IMAGE_NAME"

      - name: Save frontend image archive
        run: |
          set -e
          echo "Saving image archive frontend-${{ steps.vars.outputs.tag }}.tar.gz"
          docker save "$IMAGE_NAME:${{ steps.vars.outputs.tag }}" | gzip > "frontend-${{ steps.vars.outputs.tag }}.tar.gz"
          ls -lh "frontend-${{ steps.vars.outputs.tag }}.tar.gz"

      - name: Copy frontend image archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "frontend-${{ steps.vars.outputs.tag }}.tar.gz"
          target: "/tmp"

      - name: Deploy frontend to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            echo "==> Starting frontend deployment"
            mkdir -p "${{ env.DEPLOY_PATH }}"
            cd "${{ env.DEPLOY_PATH }}"
            echo "==> Loading image archive"
            gunzip -c "/tmp/frontend-${{ steps.vars.outputs.tag }}.tar.gz" | docker load
            rm -f "/tmp/frontend-${{ steps.vars.outputs.tag }}.tar.gz"
            if [ ! -f .env ]; then
              touch .env
            fi
            if grep -q '^FRONTEND_TAG=' .env; then
              sed -i 's/^FRONTEND_TAG=.*/FRONTEND_TAG=${{ steps.vars.outputs.tag }}/' .env
            else
              echo 'FRONTEND_TAG=${{ steps.vars.outputs.tag }}' >> .env
            fi
            echo "==> Effective FRONTEND_TAG"
            grep '^FRONTEND_TAG=' .env || true
            echo "==> Recreating frontend container"
            docker compose up -d frontend
            echo "==> Waiting for frontend health"
            sleep 8
            curl -f http://127.0.0.1/
            echo "==> Frontend container status"
            docker compose ps frontend
            echo "==> Cleaning old frontend images"
            docker image prune -f >/dev/null 2>&1 || true
            docker images "$IMAGE_NAME" --format '{{.Repository}}:{{.Tag}} {{.ID}}' | tail -n +4 | awk '{print $2}' | xargs -r docker rmi -f || true
            echo "==> Frontend deployment finished"

      - name: Clean local frontend archive
        if: always()
        run: rm -f "frontend-${{ steps.vars.outputs.tag }}.tar.gz"
